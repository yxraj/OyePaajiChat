<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OyePaajiChat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-logo">⚡</div>
        <span class="brand-name">OyePaajiChat</span>
      </div>
      <button id="close-sidebar" class="icon-sq" title="Close sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sidebar-new">
      <button id="new-chat-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New conversation
      </button>
    </div>

    <div id="history-list"></div>

    <div class="sidebar-footer">
      <button id="theme-btn" class="footer-btn">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span id="theme-label">Light mode</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <!-- TOP BAR -->
    <div id="topbar">
      <div class="topbar-left">
        <button id="open-sidebar" class="icon-sq" title="Open sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="brand-logo-sm">⚡</div>
        <span class="topbar-title">OyePaajiChat</span>
      </div>
      <button id="clear-btn" class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Clear
      </button>
    </div>

    <!-- MESSAGES -->
    <div id="messages-wrap">
      <div id="messages">
        <div id="empty-state">
          <div class="empty-icon">⚡</div>
          <span>Start a conversation below</span>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div id="input-bar">
      <div id="input-inner">
        <div id="input-box">
          <textarea id="msg-input" placeholder="Message OyePaajiChat..." rows="1" autocomplete="off" spellcheck="true"></textarea>
          <button id="send-btn" title="Send (Enter)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div id="input-hint">
          <span>Enter to send &middot; Shift+Enter for newline</span>
          <span id="char-count"></span>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script src="script.js"></script>
</body>
</html>
